<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض - تواصل معنا</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #ff9a9e 0%, #a18cd1 100%); min-height: 100vh; }
        header { background: rgba(0,0,0,0.15); color: #fff; padding: 20px; text-align: center; }
        header nav ul { list-style: none; margin-top: 15px; }
        header nav ul li { display: inline; margin: 0 10px; }
        header nav ul li a { color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        header nav ul li a.active, header nav ul li a:hover { background: rgba(255,255,255,0.3); }
        section { padding: 25px; margin: 40px auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 400px; }
        h2 { text-align: center; color: #a18cd1; margin-bottom: 25px; }
        form input, form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #f8c8dc; border-radius: 10px; font-size: 16px; }
        form input:focus, form textarea:focus { border-color: #a18cd1; outline: none; }
        form button { width: 100%; padding: 12px; background: linear-gradient(135deg, #ff9a9e, #a18cd1); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        form button:hover { opacity: 0.9; }
        @media (max-width: 768px) { header nav ul li { display: block; margin: 10px 0; } section { margin: 20px 10px; } }
    </style>
</head>
<body>
    <header>
        <h1>نبض</h1>
        <p>منصة تواصلك الذكية</p>
        <nav>
            <ul>
                <li><a href="index.html">تسجيل الدخول</a></li>
                <li><a href="home.html">الصفحة الرئيسية</a></li>
                <li><a href="contact.html" class="active">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>
    
    <section>
        <h2>تواصل معنا</h2>
        <form>
            <input type="text" placeholder="الاسم بالكامل" required>
            <input type="email" placeholder="البريد الإلكتروني" required>
            <textarea placeholder="رسالتك..." rows="5" required></textarea>
            <button type="submit">إرسال</button>
        </form>
    </section>
</body>
</html>
