<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار موقع نبض</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #ff9a9e 0%, #a18cd1 100%); min-height: 100vh; direction: rtl; padding: 20px; }
        .container { 
            background: #fff; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 25px; 
        }
        h1 { color: #a18cd1; text-align: center; margin-bottom: 20px; }
        .test-box { 
            background: #f8f9fa; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 10px; 
            border-right: 5px solid #dc3545;
        }
        .pass { border-right-color: #28a745; }
        .test-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff9a9e, #a18cd1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin: 8px 5px;
            font-weight: bold;
        }
        .test-btn:hover { opacity: 0.9; }
        code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; }
        #result { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>اختبار موقع نبض 💜</h1>
        
        <div class="test-box" id="test1">
            <strong>1. فحص ملف style.css:</strong> 
            <span id="css-status">جاري الفحص...</span>
        </div>

        <div class="test-box" id="test2">
            <strong>2. فحص الصفحات:</strong> اضغطي الأزرار للتأكد من الربط
            <br>
            <a href="./index.html" class="test-btn">index.html</a>
            <a href="./home.html" class="test-btn">home.html</a>
            <a href="./contact.html" class="test-btn">contact.html</a>
            <div id="result"></div>
        </div>

        <div class="test-box pass">
            <strong>3. ملاحظة مهمة:</strong> لازم تفتحي <code>index.html</code> بـ "Open in Browser" عشان الربط يشتغل، مش "Preview"
        </div>
    </div>

    <script>
        // اختبار هل ملف style.css موجود وشغال
        fetch('./style.css')
            .then(response => {
                if (response.ok) {
                    document.getElementById('css-status').innerHTML = '✅ موجود وشغال';
                    document.getElementById('test1').classList.add('pass');
                } else {
                    document.getElementById('css-status').innerHTML = '❌ غير موجود - تأكدي من اسم الملف';
                }
            })
            .catch(error => {
                document.getElementById('css-status').innerHTML = '❌ خطأ في المسار';
            });

        // اختبار الضغط على الروابط
        document.querySelectorAll('.test-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                document.getElementById('result').innerHTML = '✅ تم الضغط على: ' + this.textContent;
                document.getElementById('test2').classList.add('pass');
            });
        });
    </script>
</body>
</html>
